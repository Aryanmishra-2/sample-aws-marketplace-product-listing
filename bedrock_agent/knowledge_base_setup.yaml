AWSTemplateFormatVersion: '2010-09-09'
Description: 'Knowledge Base for AI Agent Marketplace with comprehensive guidance'

Parameters:
  KnowledgeBaseName:
    Type: String
    Default: 'ai-agent-marketplace-kb'
  
Resources:
  # S3 Bucket for Knowledge Base documents
  KnowledgeBaseBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${KnowledgeBaseName}-documents-${AWS::AccountId}'
      VersioningConfiguration:
        Status: Enabled

  # OpenSearch Serverless Collection
  OpenSearchCollection:
    Type: AWS::OpenSearchServerless::Collection
    Properties:
      Name: !Sub '${KnowledgeBaseName}-collection'
      Type: VECTORSEARCH
      Description: 'Vector search for AI Agent Marketplace KB'

  # Bedrock Knowledge Base
  MarketplaceKnowledgeBase:
    Type: AWS::Bedrock::KnowledgeBase
    Properties:
      Name: !Ref KnowledgeBaseName
      Description: 'Comprehensive knowledge base for AI Agent Marketplace operations'
      RoleArn: !GetAtt KnowledgeBaseRole.Arn
      KnowledgeBaseConfiguration:
        Type: VECTOR
        VectorKnowledgeBaseConfiguration:
          EmbeddingModelArn: 'arn:aws:bedrock:us-east-1::foundation-model/amazon.titan-embed-text-v2:0'
      StorageConfiguration:
        Type: OPENSEARCH_SERVERLESS
        OpensearchServerlessConfiguration:
          CollectionArn: !GetAtt OpenSearchCollection.Arn
          VectorIndexName: 'marketplace-index'
          FieldMapping:
            VectorField: 'vector'
            TextField: 'text'
            MetadataField: 'metadata'

  # Data Source for Knowledge Base
  KnowledgeBaseDataSource:
    Type: AWS::Bedrock::DataSource
    Properties:
      KnowledgeBaseId: !Ref MarketplaceKnowledgeBase
      Name: 'marketplace-documents'
      Description: 'AWS Marketplace and agent documentation'
      DataSourceConfiguration:
        Type: S3
        S3Configuration:
          BucketArn: !GetAtt KnowledgeBaseBucket.Arn
          InclusionPrefixes:
            - 'marketplace-docs/'
            - 'agent-guides/'
            - 'troubleshooting/'
            - 'validation-rules/'

  # IAM Role for Knowledge Base
  KnowledgeBaseRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: bedrock.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonBedrockFullAccess
      Policies:
        - PolicyName: KnowledgeBaseS3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt KnowledgeBaseBucket.Arn
                  - !Sub '${KnowledgeBaseBucket.Arn}/*'

Outputs:
  KnowledgeBaseId:
    Description: 'Knowledge Base ID for agents'
    Value: !Ref MarketplaceKnowledgeBase
    Export:
      Name: !Sub '${AWS::StackName}-KnowledgeBaseId'
  
  BucketName:
    Description: 'S3 Bucket for uploading documents'
    Value: !Ref KnowledgeBaseBucket