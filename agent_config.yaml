agents:
  - name: "create_saas"
    file: "create_saas.py"
    class: "CreateSaasAgent"
    dependencies:
      - "strands"
    
  - name: "serverless_saas_integration"
    file: "serverless_saas_integration.py"
    class: "ServerlessSaasIntegrationAgent"
    dependencies:
      - "strands"
      - "boto3"
      - "botocore"
    environment:
      - "AWS_DEFAULT_REGION=us-east-1"
    
  - name: "metering"
    file: "metering.py"
    class: "MeteringAgent"
    dependencies:
      - "strands"
      - "boto3"
      - "botocore"
    environment:
      - "AWS_DEFAULT_REGION=us-east-1"