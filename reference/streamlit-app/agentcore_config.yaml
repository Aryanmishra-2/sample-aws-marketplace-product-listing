# AgentCore Configuration for Strands Marketplace Agent
# Use with: agentcore configure --config agentcore_config.yaml

# Runtime configuration
runtime:
  entrypoint: agent/strands_entrypoint.py
  handler: agent_invocation
  
# Environment variables
environment:
  AWS_REGION: us-east-1
  MODEL_ID: us.anthropic.claude-3-7-sonnet-20250219-v1:0
  BYPASS_TOOL_CONSENT: "true"

# Memory configuration (optional)
memory:
  enabled: true
  type: semantic
  
# Resource configuration
resources:
  memory_mb: 2048
  timeout_seconds: 300

# Deployment
deployment:
  name: marketplace-listing-agent
  description: AWS Marketplace SaaS Listing Creator using Strands SDK
