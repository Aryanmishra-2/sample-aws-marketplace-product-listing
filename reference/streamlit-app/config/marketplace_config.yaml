marketplace:
  region: "us-east-1"
  catalog_api_version: "2018-09-17"
  
  # Product types
  product_types:
    - "SaaSProduct"
  
  # Required fields for SaaS listings
  required_fields:
    product_info:
      - "ProductTitle"
      - "ShortDescription"
      - "LongDescription"
      - "LogoUrl"
      - "Categories"
      - "SearchKeywords"
    
    pricing:
      - "PricingModel"  # Subscription, Contract, or Free
      - "Dimensions"    # For usage-based pricing
    
    integration:
      - "FulfillmentUrl"
      - "LandingPageUrl"
    
    support:
      - "SupportEmail"
      - "SupportDescription"
  
  # Validation rules
  validation:
    product_title:
      min_length: 5
      max_length: 255
    short_description:
      min_length: 10
      max_length: 500
    long_description:
      min_length: 50
      max_length: 5000
    categories:
      min_count: 1
      max_count: 3
    search_keywords:
      max_count: 10
      max_length_per_keyword: 50

  # Pricing models
  pricing_models:
    - name: "Subscription"
      description: "Recurring subscription pricing"
    - name: "Contract"
      description: "Contract-based pricing with commitments"
    - name: "Free"
      description: "Free tier or trial"
