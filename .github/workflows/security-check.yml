name: Security Check

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read
  security-events: write

jobs:
  security:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Check for secrets
      run: |
        # Check for common secret patterns
        if grep -r -E "(AWS_ACCESS_KEY_ID|AWS_SECRET_ACCESS_KEY|AKIA[0-9A-Z]{16})" --exclude-dir=.git --exclude="*.md" --exclude=".env.example" .; then
          echo "❌ Potential secrets found in repository!"
          exit 1
        fi
        echo "✅ No secrets detected"
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install safety bandit
    
    - name: Check Python dependencies for vulnerabilities
      run: |
        pip install -r requirements.txt
        safety check --json || true
    
    - name: Run Bandit security linter
      run: |
        bandit -r backend/ tools/ -f json || true
    
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    
    - name: Install frontend dependencies
      run: |
        cd frontend
        npm ci
    
    - name: Run npm audit
      run: |
        cd frontend
        npm audit --audit-level=moderate || true
    
    - name: Check for TODO/FIXME with security implications
      run: |
        grep -r "TODO.*security\|FIXME.*security\|XXX.*security" --exclude-dir=.git . || echo "No security TODOs found"
