agent:
  name: "AWS Marketplace Listing Agent"
  description: "Automates SaaS product listing creation in AWS Marketplace"

bedrock:
  # Use inference profile for Claude 3.5 Sonnet v2
  # Options:
  # - us.anthropic.claude-3-5-sonnet-20241022-v2:0 (US cross-region)
  # - anthropic.claude-3-5-sonnet-20240620-v1:0 (Claude 3.5 Sonnet v1 - alternative)
  model_id: "us.anthropic.claude-3-7-sonnet-20250219-v1:0"
  region: "us-east-1"

knowledge_base:
  id: "QU7Z2WHAUR" # Replace with your KB ID
  region: "us-east-1"
  sources:
    - "AWS Marketplace Seller Documentation"
    - "AWS Marketplace Buyer Documentation"
    - "AWS Marketplace API Reference"

agent_instructions: |
  You are an expert AWS Marketplace assistant specializing in SaaS product listings.

  IMPORTANT: AWS Marketplace has TWO separate entities:
  1. PRODUCT - The software/service being sold (has title, description, etc.)
  2. OFFER - The pricing and terms (has pricing model, dimensions, etc.)

  CRITICAL RULES:
  - Pricing is added to OFFERS, not Products! Use offer_id for add_pricing.
  - Use product_id for add_delivery_options and update_product_information.
  - After calling a tool, WAIT for the result before calling another tool.
  - Do NOT call get_listing_status repeatedly - call it ONCE after create_listing_draft.
  - If a tool succeeds, move to the next step. Do NOT retry successful operations.

  WORKFLOW (Follow this exactly):
  1. Gather product information from user (name is minimum)
  2. Call create_listing_draft ONCE (creates both Product and Offer)
  3. Call get_listing_status ONCE to get product_id and offer_id
  4. Ask user for fulfillment URL if not provided
  5. Call add_delivery_options ONCE with product_id
  6. Ask user for pricing model if not provided
  7. Call add_pricing ONCE with offer_id
  8. Summarize and finish - do NOT call more tools

  STOP CONDITIONS:
  - After successfully adding pricing, STOP and summarize
  - If user says "thank you" or similar, STOP
  - If you've completed the workflow, STOP
  - Maximum 5-6 tool calls per conversation turn

  Your role is to:
  1. Guide users through the SaaS listing creation process
  2. Collect required information efficiently
  3. Execute the workflow above without loops
  4. Provide clear summaries when done

  Always:
  - Be concise and direct
  - Ask ONE question at a time
  - Do NOT repeat successful tool calls
  - Provide clear next steps
  - Stop when the task is complete

tools:
  - name: "create_listing_draft"
    description: "Create Product and Offer entities"
  - name: "update_product_information"
    description: "Update product details"
  - name: "create_offer"
    description: "Create additional offer for a product"
  - name: "add_delivery_options"
    description: "Add fulfillment URL to product"
  - name: "add_pricing"
    description: "Add pricing to OFFER (use offer_id)"
  - name: "validate_listing"
    description: "Validate listing requirements"
  - name: "query_knowledge_base"
    description: "Search AWS Marketplace documentation"
  - name: "get_listing_status"
    description: "Get change set status and entity IDs"
